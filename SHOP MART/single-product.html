<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Mart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/utilities.css">
</head>

<body>

    <!-- UP-BUTTON -->
    <button id="upButton" class="btn  position-fixed bottom-0 end-0 m-3">
        <i class="bi bi-arrow-up"></i>
    </button>

    <header>
        <!-- NAVBAR -->

        <nav class="navbar bg-body-tertiary fixed-top">
            <div class="container">
                <a class="navbar-brand logo fs-1" href="#">Shop Mart</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end text-center" tabindex="-1" id="offcanvasNavbar"
                    aria-labelledby="offcanvasNavbarLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title fs-2 fw-bold ps-3" id="offcanvasNavbarLabel">Menu</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                            <li class="nav-item">
                                <a class="nav-link " aria-current="page" href="./index.html">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="./view-product.html">View Products</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="./add-product.html">Add Products</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="./edit-product.html">Edit Products</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="./cart.html">Cart</a>
                            </li>
                        </ul>
                        <form class="d-flex mt-5" role="search">
                            <input class="form-control search-bar me-2" type="search" placeholder="Search"
                                aria-label="Search" />
                            <button class="btn btn-search py-2" type="submit"><i class="bi bi-search"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>

    </header>

    <main>
        <!-- SINGLE PRODUCT -->
        <section class="single-product text-center" style="margin-bottom: 100px; margin-top: 200px;">
            <div class="container">
                <div class="row " id="single-product-container">

                </div>
            </div>
        </section>

    </main>

    <footer>

        <!-- FOOTER -->

        <div class="container">
            <div class="row text-center">
                <div class="col-md-4 mb-4">
                    <h4 class="fs-3 fw-semibold">Shop Mart</h4>

                    <p class="fw500">Your one-stop destination for premium shopping.</p>
                </div>

                <div class="col-md-4 mb-4">
                    <h4 class="fs-3 fw-semibold">Quick Links</h4>

                    <p><a href="./index.html">Home</a></p>
                    <p><a href="./view-product.html">View Products</a></p>
                    <p><a href="./cart.html">Cart</a></p>
                </div>

                <div class="col-md-4">
                    <h4 class="fs-3 fw-semibold">Follow Us</h4>

                    <div class="footer-social">
                        <a href="#"><i class="bi bi-facebook"></i></a>
                        <a href="#"><i class="bi bi-instagram"></i></a>
                        <a href="#"><i class="bi bi-twitter-x"></i></a>
                        <a href="#"><i class="bi bi-youtube"></i></a>
                    </div>
                </div>
            </div>

            <hr />

            <p class="text-center mb-0">© 2026 Shop Mart. All Rights Reserved.</p>
        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        let html = "";
        let products = JSON.parse(localStorage.getItem("products")) || [];
        let singleProduct = document.getElementById("single-product-container");

        let id = localStorage.getItem("viewProductId");
        products.map((p) => {
            if (p.id == id) {
                html += `
                    <div class="col-lg-5  d-flex align-items-center justify-content-start pe-sm-0 pe-lg-5">
                        <img src="${p.image}" class="img-fluid" alt="${p.name}">
                    </div>
                    <div class="col-lg-7 col-12 mt-5 mx-auto ps-5">
                        <h2 class="fs48 fw-bold my-2">${p.name}</h2>
                        <h2 class="fs32 fw-semibold my-4" style="color: #bae8e8; ">Brand: ${p.brand}</h2>
                        <h2 class="fs32 fw-semibold my-4" style="color: #bae8e8; ">Category: ${p.category}</h2>
                        <p class="fs24 fw-semibold my-4" style="color: #bae8e8;">Price: ₹${p.price}</p>
                        <p class="fs16 fw500 my-5">${p.description}</p>

                        <div class="d-flex gap-2 mt-4">
                            <button class="btn3 w-100" onclick="addToCart(${p.id})">
                                Add to Cart
                            </button>
                            <button class="btn4 w-100" onclick="backToHome()">
                                Back to Home Page
                            </button>
                        </div>
                    </div>
                `;
            }
        });
        singleProduct.innerHTML = html;

        function addToCart(id) {
            let cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
            const existingItem = cartItems.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cartItems.push({ id, quantity: 1 });
            }
            localStorage.setItem("cartItems", JSON.stringify(cartItems));
            alert("Product added to cart!");
            window.location.href = "./cart.html";
        }
        function backToHome() {
            window.location.href = "./index.html";
        }


    </script>
    <script src="./assets/js/script.js"></script>
</body>

</html>
